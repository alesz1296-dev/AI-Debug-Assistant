name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy apps/api/app apps/api/tests
      - name: Test
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: |
          for attempt in 1 2 3; do
            docker compose -f infra/docker-compose.yml build api && exit 0
            if [ "$attempt" -lt 3 ]; then
              echo "docker-build failed on attempt $attempt/3; retrying in 15s..."
              sleep 15
            fi
          done
          exit 1

  compose-smoke:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Compose smoke test
        run: |
          for attempt in 1 2 3; do
            python scripts/ci_compose_smoke.py && exit 0
            if [ "$attempt" -lt 3 ]; then
              echo "compose-smoke failed on attempt $attempt/3; retrying in 15s..."
              sleep 15
            fi
          done
          exit 1

  k8s-smoke:
    runs-on: ubuntu-latest
    needs: compose-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - name: Run Kubernetes smoke test
        run: |
          for attempt in 1 2 3; do
            python scripts/ci_k8s_smoke.py && exit 0
            if [ "$attempt" -lt 3 ]; then
              echo "k8s-smoke failed on attempt $attempt/3; retrying in 15s..."
              sleep 15
            fi
          done
          exit 1
