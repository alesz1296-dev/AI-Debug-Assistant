nameOverride: ""
fullnameOverride: ""

image:
  repository: ai-debug-assistant-api
  tag: local
  pullPolicy: IfNotPresent

appConfig:
  appName: Enterprise AI Debug Assistant
  appEnv: local-k8s
  logLevel: INFO
  allowSqliteFallback: "false"
  embeddingProvider: local
  llmProvider: local

auth:
  apiKey: dev-local-key

postgres:
  enabled: true
  image: pgvector/pgvector:pg16
  user: debug
  password: debug
  database: debug_assistant
  storageSize: 5Gi

redis:
  enabled: true
  image: redis:7-alpine

external:
  databaseUrl: ""
  redisUrl: ""

api:
  replicaCount: 1
  service:
    port: 8000
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

worker:
  replicaCount: 1

migration:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
