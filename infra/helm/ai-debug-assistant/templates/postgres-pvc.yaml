{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-debug-assistant.postgresName" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-debug-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storageSize }}
{{- end }}
