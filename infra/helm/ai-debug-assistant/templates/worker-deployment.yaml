apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-debug-assistant.workerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-debug-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-debug-assistant.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "ai-debug-assistant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
          args:
            - -m
            - app.workers.ingestion
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - configMapRef:
                name: {{ include "ai-debug-assistant.configName" . }}
            - secretRef:
                name: {{ include "ai-debug-assistant.secretName" . }}
