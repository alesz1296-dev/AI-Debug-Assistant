apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-debug-assistant.apiName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-debug-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  selector:
    {{- include "ai-debug-assistant.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.port }}
