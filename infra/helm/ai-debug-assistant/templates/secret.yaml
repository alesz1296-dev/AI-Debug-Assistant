apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-debug-assistant.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-debug-assistant.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ .Values.auth.apiKey | quote }}
  DATABASE_URL: {{ include "ai-debug-assistant.databaseUrl" . | quote }}
  REDIS_URL: {{ include "ai-debug-assistant.redisUrl" . | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
