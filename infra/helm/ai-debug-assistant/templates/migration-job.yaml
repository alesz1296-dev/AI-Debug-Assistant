{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ai-debug-assistant.fullname" . }}-migrations-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-debug-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "ai-debug-assistant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image | quote }}
          command:
            - sh
          args:
            - -c
            - >
              until pg_isready -h {{ include "ai-debug-assistant.postgresName" . }}
              -U "$POSTGRES_USER" -d "$POSTGRES_DB";
              do
                echo "waiting for postgres";
                sleep 2;
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-debug-assistant.secretName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-debug-assistant.secretName" . }}
                  key: POSTGRES_DB
      containers:
        - name: alembic
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - alembic
          args:
            - -c
            - alembic.ini
            - upgrade
            - head
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - configMapRef:
                name: {{ include "ai-debug-assistant.configName" . }}
            - secretRef:
                name: {{ include "ai-debug-assistant.secretName" . }}
{{- end }}
