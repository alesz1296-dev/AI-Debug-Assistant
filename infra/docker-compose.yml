name: ai-debug-assistant

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: debug
      POSTGRES_PASSWORD: debug
      POSTGRES_DB: debug_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      API_KEY: dev-local-key
      DATABASE_URL: postgresql+psycopg://debug:debug@postgres:5432/debug_assistant
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:

