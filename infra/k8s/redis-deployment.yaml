apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ai-debug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          # TODO: add readiness and liveness probes after the first deployment works.
          # TODO: decide later whether local persistence is useful for this lab stage.
